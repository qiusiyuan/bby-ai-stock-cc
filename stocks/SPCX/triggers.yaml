# Pre-commitment device. Confirm or edit values; reasoning below each.

thesis_break_price: null
# 用户无持仓, 纯跟踪模式 — 不触发卖出提醒。

kill_conditions:
  - "Starship suffers a major catastrophic failure that delays cargo cadence by >18 months"
  - "Starlink ARPU drops below $50 for two consecutive quarters"
  - "Net insider selling exceeds $5B in any 90-day window post-lockup"
  - "Material related-party transaction reduces SpaceX shareholder economics"
  - "Major regulatory action revokes Starlink spectrum or causes multi-country bans"

re_read_triggers:
  - "Stock down >15% on no obvious news"
  - "Missed quarter (revenue or Starlink subs)"
  - "Starlink monthly subscriber growth turns negative"
  - "Cluster insider selling reported on Form 4"
  - "Starship test failure or schedule slip announcement"
  - "Lock-up expiry approaching (180 days from IPO = ~2026-12-09)"
